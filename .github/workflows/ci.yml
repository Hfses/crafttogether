name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

  apk:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prebuild Android project
        working-directory: app
        run: pnpm exec expo prebuild --platform android --no-install

      - name: Build APK
        working-directory: app/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: cp app/android/app/build/outputs/apk/release/app-release.apk CraftTogether.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CraftTogether-apk
          path: CraftTogether.apk

      - name: Publish latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: crafttogether-latest
          name: "CraftTogether (última build)"
          body: |
            Build automática da branch `main`.

            - **CraftTogether.apk** — aplicativo Android. Instale, abra e configure o endereço do seu servidor na tela "Servidor".
          files: CraftTogether.apk
